<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPA Schedule Creator | Bonus Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #111827, #1e293b);
        color: white;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .container {
        background: rgba(31, 41, 55, 0.95);
        max-width: 600px;
        width: 100%;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border: 1px solid #374151;
        text-align: center;
    }
    h1 {
        color: #f43f5e;
        margin-bottom: 5px;
        font-size: 24px;
    }
    p.subtitle {
        color: #9ca3af;
        font-size: 14px;
        margin-bottom: 25px;
    }
    .form-group {
        text-align: left;
        margin-bottom: 15px;
    }
    label {
        font-size: 13px;
        color: #a78bfa;
        font-weight: 600;
        margin-bottom: 5px;
        display: block;
    }
    input, select {
        width: 100%;
        padding: 12px;
        background: #374151;
        color: white;
        border: 1px solid #4b5563;
        border-radius: 8px;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }
    input:focus, select:focus {
        outline: none;
        border-color: #8b5cf6;
    }
    button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        color: white;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
        transition: transform 0.2s;
    }
    button:hover {
        transform: scale(1.02);
    }
    textarea {
        width: 100%;
        height: 220px;
        background: #111827;
        color: #10b981;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
        box-sizing: border-box;
        font-family: monospace;
        font-size: 13px;
        resize: none;
    }
    .footer {
        margin-top: 30px;
        font-size: 13px;
        color: #9ca3af;
    }
    .quote-box {
        margin-top: 20px;
        padding: 15px;
        background: rgba(245, 158, 11, 0.1);
        border-left: 4px solid #f59e0b;
        border-radius: 4px;
        text-align: left;
    }
    .quote-text {
        font-style: italic;
        color: #fcd34d;
        font-size: 13px;
        margin: 0 0 5px 0;
    }
    .quote-author {
        color: #fbbf24;
        font-weight: bold;
        font-size: 12px;
        margin: 0;
    }
</style>
</head>
<body>

<div class="container">
    <h1>📅 NPA Schedule Creator</h1>
    <p class="subtitle">Generator Background Jadwal (Resolusi Cetak A4 / AP 230gr)</p>
    
    <div class="form-group">
        <label>Pilih Tema Jadwal</label>
        <select id="kategori">
            <option value="anak">📚 Jadwal Pelajaran Anak (Lucu & Edukatif)</option>
            <option value="bisnis">💼 Jadwal Training Bisnis (Elegan & Profesional)</option>
            <option value="ibadah">🕋 Jadwal Ibadah/Ramadhan (Spiritual & Estetik)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Judul / Nama Acara</label>
        <input type="text" id="judul" value="JADWAL PELAJARAN" placeholder="Contoh: JADWAL PELAJARAN SD">
    </div>
    
    <button id="generateBtn">✨ Generate Prompt Jadwal Cetak</button>
    
    <textarea id="output" readonly placeholder="Prompt untuk AI Gambar akan muncul di sini..."></textarea>
    
    <div class="footer">
        <p>Tools gratis persembahan dari komunitas digital preneur.</p>
        
        <div class="quote-box">
            <p class="quote-text" id="qText">"Pendidikan adalah tiket menuju masa depan. Semangat belajar meraih cita-cita!"</p>
            <p class="quote-author" id="qAuthor">- Semangat Edukasi</p>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('generateBtn');
    const output = document.getElementById('output');
    const kategoriSelect = document.getElementById('kategori');
    const qText = document.getElementById('qText');
    const qAuthor = document.getElementById('qAuthor');
    
    // Database Quotes Otomatis
    const quotesDB = {
        'anak': {
            text: '"Pendidikan adalah tiket menuju masa depan. Semangat belajar untuk meraih cita-cita!"',
            author: '- Semangat Edukasi'
        },
        'bisnis': {
            text: '"Bisa karena terbiasa, sukses tercipta karena berani dipaksa keluar dari zona nyaman."',
            author: '- Pakde Sugiarto Kurniawan (Founder NPA)'
        },
        'ibadah': {
            text: '"Jadikan setiap ikhtiar dan waktumu sebagai ibadah. InsyaAllah berkah dunia, selamat di akhirat."',
            author: '- Istikmal Syariah'
        }
    };

    // Fungsi ganti quote saat dropdown berubah
    kategoriSelect.addEventListener('change', () => {
        const kat = kategoriSelect.value;
        qText.innerText = quotesDB[kat].text;
        qAuthor.innerText = quotesDB[kat].author;
    });

    btn.addEventListener('click', () => {
        const kat = kategoriSelect.value;
        const judul = document.getElementById('judul').value || "JADWAL SPESIAL";
        let promptTxt = "";
        
        const baseSetup = "Aspect Ratio: 3:4 (Printable A4 portrait format). Visual Requirements: Ultra detailed, 8K resolution, printable quality for Art Paper 230gr, high contrast, clean layout.";
        
        // Instruksi Teks & Grid yang sangat ketat
        const typographyInstruction = `CRITICAL TYPOGRAPHY & LAYOUT INSTRUCTION:\n1. At the top center of the board, precisely write the title text: "${judul}".\n2. Inside the main board, draw a neat schedule grid/table with horizontal lined rows.\n3. Clearly write the days of the week integrated into the grid rows/columns: "AHAD", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU".\n4. Ensure all spelling is 100% perfectly accurate and legible.`;
        
        if(kat === 'anak') {
            promptTxt = `IMAGE PROMPT FOR KIDS SCHEDULE:\nTheme: ${judul}\n\n${baseSetup}\n\n${typographyInstruction}\n\nStyle: Cute 3D Pixar animation style, colorful and cheerful. Draw a large central board/paper for the schedule. Decorate the borders around the board with adorable astronauts, floating planets, glowing stars, and cute books. Soft bright lighting, joyful atmosphere.`;
        } else if(kat === 'bisnis') {
            promptTxt = `IMAGE PROMPT FOR BUSINESS SCHEDULE:\nTheme: ${judul}\n\n${baseSetup}\n\n${typographyInstruction}\n\nStyle: Modern luxury corporate design. Draw a large elegant central board for the schedule. Decorate the borders with elegant gold lines, a subtle glowing futuristic city background, and modern office elements (like a premium coffee cup and a sleek laptop). Studio lighting, professional executive feel.`;
        } else if(kat === 'ibadah') {
            promptTxt = `IMAGE PROMPT FOR ISLAMIC SCHEDULE:\nTheme: ${judul}\n\n${baseSetup}\n\n${typographyInstruction}\n\nStyle: Elegant Islamic aesthetic. Draw a large beautiful central parchment/board for the schedule. Decorate the borders with beautiful golden geometric patterns, soft glowing Moroccan lanterns hanging, and a subtle silhouette of Masjidil Haram in the background. Golden hour lighting, peaceful spiritual atmosphere.`;
        }
        
        output.value = promptTxt;
        
        // Auto-copy to clipboard
        navigator.clipboard.writeText(promptTxt);
        alert("Prompt berhasil dibuat dan otomatis di-copy! Silakan paste di AI Gambar Anda.");
    });
</script>

</body>
</html>
