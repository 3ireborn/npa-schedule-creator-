<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPA Schedule Creator | Pro Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #111827, #1e293b);
        color: white;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .container {
        background: rgba(31, 41, 55, 0.95);
        max-width: 600px;
        width: 100%;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border: 1px solid #374151;
    }
    h1 {
        color: #f43f5e;
        margin-bottom: 5px;
        font-size: 24px;
        text-align: center;
    }
    p.subtitle {
        color: #9ca3af;
        font-size: 14px;
        margin-bottom: 25px;
        text-align: center;
    }
    .form-group {
        margin-bottom: 15px;
    }
    label {
        font-size: 13px;
        color: #a78bfa;
        font-weight: 600;
        margin-bottom: 5px;
        display: block;
    }
    input, select {
        width: 100%;
        padding: 12px;
        background: #374151;
        color: white;
        border: 1px solid #4b5563;
        border-radius: 8px;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }
    input:focus, select:focus {
        outline: none;
        border-color: #8b5cf6;
    }
    button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        color: white;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
        transition: transform 0.2s;
    }
    button:hover {
        transform: scale(1.02);
    }
    textarea {
        width: 100%;
        height: 250px;
        background: #111827;
        color: #10b981;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
        box-sizing: border-box;
        font-family: monospace;
        font-size: 13px;
        resize: none;
    }
    .hidden {
        display: none;
    }
</style>
</head>
<body>

<div class="container">
    <h1>📅 NPA Schedule Creator</h1>
    <p class="subtitle">Desain Template Jadwal Resolusi Cetak (AP 230gr)</p>
    
    <div class="form-group">
        <label>1. Pilih Kategori Utama</label>
        <select id="kategoriUtama">
            <option value="sekolah">🏫 Pelajaran Sekolah</option>
            <option value="bisnis">💼 Bisnis & Target</option>
            <option value="ibadah">🕋 Ramadhan & Ibadah</option>
        </select>
    </div>
    
    <div class="form-group" id="groupSekolah">
        <label>2. Tingkat Sekolah</label>
        <select id="subSekolah">
            <option value="tk">Jadwal Pelajaran TK (Cute & Fun)</option>
            <option value="sd">Jadwal Pelajaran SD (Adventure/Astronaut)</option>
            <option value="smp">Jadwal Pelajaran SMP (Cool Anime/Pop)</option>
            <option value="sma">Jadwal Pelajaran SMA/SMK (Aesthetic/Lo-Fi)</option>
        </select>
    </div>

    <div class="form-group hidden" id="groupBisnis">
        <label>2. Jenis Jadwal Bisnis</label>
        <select id="subBisnis">
            <option value="target">Target Omzet Tahunan (12 Kotak Bulan Kosong)</option>
            <option value="todo">To-Do List Harian (Kotak Checklist)</option>
        </select>
    </div>

    <div class="form-group hidden" id="groupIbadah">
        <label>2. Jenis Jadwal Ibadah</label>
        <select id="subIbadah">
            <option value="mutabaah">Marketing Langit (Checklist Mutaba'ah)</option>
            <option value="imsakiyah">Template Jadwal Imsakiyah (30 Baris Kosong)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>3. Judul / Nama Acara</label>
        <input type="text" id="judul" value="JADWAL PELAJARAN" placeholder="Contoh: JADWAL PELAJARAN KELAS 5">
    </div>

    <div class="form-group">
        <label>4. Pesan Motivasi (Quote di dalam Gambar)</label>
        <input type="text" id="quoteText" value="Pendidikan adalah tiket menuju masa depan yang cerah!" placeholder="Masukkan pesan singkat untuk di gambar...">
    </div>
    
    <button id="generateBtn">✨ Generate Prompt Jadwal Cetak</button>
    
    <textarea id="output" readonly placeholder="Prompt untuk AI Gambar akan muncul di sini..."></textarea>
    
</div>

<script>
    const kategoriUtama = document.getElementById('kategoriUtama');
    const groupSekolah = document.getElementById('groupSekolah');
    const groupBisnis = document.getElementById('groupBisnis');
    const groupIbadah = document.getElementById('groupIbadah');
    const quoteText = document.getElementById('quoteText');
    const judulInput = document.getElementById('judul');
    
    // Auto Quotes & Judul based on Category
    const autoFill = {
        'sekolah': { j: "JADWAL PELAJARAN", q: "Pendidikan adalah tiket menuju masa depan yang cerah!" },
        'bisnis': { j: "TARGET OMSET TAHUNAN", q: "Sukses tercipta karena berani keluar dari zona nyaman." },
        'ibadah': { j: "MARKETING LANGIT", q: "Rezeki itu dari Allah. Jadikan setiap ikhtiar sebagai ibadah." }
    };

    kategoriUtama.addEventListener('change', () => {
        const val = kategoriUtama.value;
        groupSekolah.classList.add('hidden');
        groupBisnis.classList.add('hidden');
        groupIbadah.classList.add('hidden');
        
        if(val === 'sekolah') groupSekolah.classList.remove('hidden');
        if(val === 'bisnis') groupBisnis.classList.remove('hidden');
        if(val === 'ibadah') groupIbadah.classList.remove('hidden');

        judulInput.value = autoFill[val].j;
        quoteText.value = autoFill[val].q;
    });

    document.getElementById('generateBtn').addEventListener('click', () => {
        const utama = kategoriUtama.value;
        const judul = document.getElementById('judul').value || "JADWAL";
        const quote = document.getElementById('quoteText').value || "Tetap Semangat!";
        let sub = "";
        
        if (utama === 'sekolah') sub = document.getElementById('subSekolah').value;
        if (utama === 'bisnis') sub = document.getElementById('subBisnis').value;
        if (utama === 'ibadah') sub = document.getElementById('subIbadah').value;

        let promptTxt = "";
        const baseSetup = "Aspect Ratio: 3:4 (Printable A4 portrait format). Visual Requirements: Ultra detailed, 8K resolution, printable quality for Art Paper 230gsm, high contrast, clean poster layout.";
        
        // 1. KATEGORI SEKOLAH (6 Panel Bergaris + Space Nama + Karakter Cowok Cewek)
        if (utama === 'sekolah') {
            const layoutSchool = `CRITICAL LAYOUT: \n1. TOP: Write the title boldly: "${judul}".\n2. SUBTITLE SPACE: Leave a clear, empty horizontal gap directly below the title so the user can manually write their "School Name and Academic Year" later.\n3. MIDDLE: Draw exactly 6 DISTINCT, SEPARATE rounded panels (arranged in a 3x2 or 2x3 grid). \n4. INSIDE THE PANELS: Draw neat horizontal ruled lines (straight horizontal writing lines from left to right) inside every panel. Above each panel, write the days: "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU".\n5. BOTTOM: Clearly write the quote: "${quote}".`;
            
            if (sub === 'tk') promptTxt = `IMAGE PROMPT (TK SCHEDULE):\n${baseSetup}\n\n${layoutSchool}\n\nStyle: Cute 3D Pixar animation style. On the left and right sides of the background, place cute 3D characters of a little kindergarten boy and girl in school uniform. Decorate with adorable fluffy animals, rainbows, and blocks. Soft pastel lighting.`;
            if (sub === 'sd') promptTxt = `IMAGE PROMPT (SD SCHEDULE):\n${baseSetup}\n\n${layoutSchool}\n\nStyle: 3D Pixar Adventure style. On the left and right sides, place cute 3D characters of an elementary school boy and girl in uniform. Decorate the background with glowing planets, space elements, and floating books. Vibrant deep blue and gold colors.`;
            if (sub === 'smp') promptTxt = `IMAGE PROMPT (SMP SCHEDULE):\n${baseSetup}\n\n${layoutSchool}\n\nStyle: Cool pop-culture anime/comic style. On the sides, place 3D characters of a middle school boy and girl in neat school uniform. Decorate with dynamic urban elements, skateboards, and stylish geometric shapes. Bright energetic colors.`;
            if (sub === 'sma') promptTxt = `IMAGE PROMPT (SMA SCHEDULE):\n${baseSetup}\n\n${layoutSchool}\n\nStyle: Aesthetic lo-fi study room style. On the sides, place stylized 3D characters of a high school boy and girl in neat uniform. Decorate with minimalist floating polaroid photos, coffee cups, and indoor plants. Warm sunset lighting, cozy aesthetic vibe.`;
        } 
        
        // 2. KATEGORI BISNIS
        else if (utama === 'bisnis') {
            if (sub === 'target') {
                const layoutTarget = `CRITICAL LAYOUT: \n1. TOP: Write the title: "${judul}".\n2. MIDDLE: Draw exactly 12 blank rectangular boxes (without horizontal lines inside) arranged neatly. Label the boxes from "BULAN 1" to "BULAN 12".\n3. BOTTOM: Clearly write the quote: "${quote}".`;
                promptTxt = `IMAGE PROMPT (12 MONTHS TARGET):\n${baseSetup}\n\n${layoutTarget}\n\nStyle: Premium executive goal-setting board. Rich dark grey and gold tones. A sophisticated office background with a glowing growth chart hologram. Highly motivational and luxurious.`;
            }
            if (sub === 'todo') {
                const layoutTodo = `CRITICAL LAYOUT: \n1. TOP: Write the title: "${judul}".\n2. MIDDLE: Draw a large elegant blank notepad with multiple blank checkbox circles on the left side for daily tasks.\n3. BOTTOM: Clearly write the quote: "${quote}".`;
                promptTxt = `IMAGE PROMPT (DAILY TO-DO):\n${baseSetup}\n\n${layoutTodo}\n\nStyle: Minimalist luxury desk setup. A premium leather journal, an expensive fountain pen, and a cup of black coffee. Natural morning sunlight hitting the desk.`;
            }
        }

        // 3. KATEGORI IBADAH
        else if (utama === 'ibadah') {
            if (sub === 'mutabaah') {
                const layoutMutabaah = `CRITICAL LAYOUT: \n1. TOP: Write the title: "${judul}".\n2. MIDDLE: Draw a clean checklist grid for daily worship routines. Write vertical columns for "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu", "Ahad". Leave the checklist circles empty.\n3. BOTTOM: Clearly write the quote: "${quote}".`;
                promptTxt = `IMAGE PROMPT (MARKETING LANGIT CHECKLIST):\n${baseSetup}\n\n${layoutMutabaah}\n\nStyle: Clean, pure, and elegant Islamic design. Emerald green and gold themes. A beautiful Quran and tasbih resting on a table in the background. Soft divine lighting, majestic and peaceful.`;
            }
            if (sub === 'imsakiyah') {
                const layoutImsak = `CRITICAL LAYOUT: \n1. TOP: Write the title: "${judul}".\n2. MIDDLE: Draw a large empty table template with exactly 30 blank horizontal rows meant for the 30 days of Ramadhan. (Do not write the times, keep the rows empty for the user to write later).\n3. BOTTOM: Clearly write the quote: "${quote}".`;
                promptTxt = `IMAGE PROMPT (IMSAKIYAH TEMPLATE):\n${baseSetup}\n\n${layoutImsak}\n\nStyle: Majestic Islamic aesthetic. Intricate gold geometric borders, glowing Moroccan lanterns hanging, soft silhouette of a beautiful mosque at sunset. Warm golden hour lighting.`;
            }
        }
        
        output.value = promptTxt;
        navigator.clipboard.writeText(promptTxt);
        alert("Prompt berhasil dibuat dan di-copy! Paste di AI Gambar Anda.");
    });
</script>

</body>
</html>
